name: Bongkar Paksa Vendor Boot via AIK

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Link download vendor_boot.img dari Releases lo'
        required: true
        default: ''

jobs:
  bongkar_aik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio lz4 xz-utils bzip2 gzip tar file

    - name: Clone AIK Linux Resmi
      run: |
        # Mengunci langsung ke branch Linux resmi osm0sis agar file lengkap
        git clone -b android-image-kitchen https://github.com/osm0sis/Android-Image-Kitchen.git aik

    - name: Download & Bongkar File
      run: |
        cd aik
        
        # Download biner langsung ke folder aik
        curl -L -o vendor_boot.img "${{ github.event.inputs.download_url }}"
        
        # Beri izin eksekusi penuh secara massal
        chmod -R +x .
        
        # Jalankan unpackimg.sh versi Linux bawaan
        ./unpackimg.sh --local vendor_boot.img
        
        # Buat folder penampung hasil di luar
        mkdir -p ../hasil_ekstrak
        
        # Pindahkan isi ramdisk atau split_img tempat fstab berada
        if [ -d "ramdisk" ]; then
          cp -r ramdisk/* ../hasil_ekstrak/
        elif [ -d "split_img" ]; then
          cp -r split_img/* ../hasil_ekstrak/
        else
          echo "AIK gagal ngebongkar ramdisk ini"
          exit 1
        fi

    - name: Simpan Hasil ke Repository
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # Pindahkan semua hasil ekstrak ke root repository lo
        cp -r hasil_ekstrak/* . || exit 0
        rm -rf aik hasil_ekstrak
        
        git add .
        git commit -m "Bongkar paksa ramdisk sukses via AIK Fix Branch" || exit 0
        git push origin main
