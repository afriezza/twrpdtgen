name: Otomatis Ekstrak Vendor Boot

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Link download vendor_boot.img dari Releases lo'
        required: true
        default: ''

jobs:
  ekstrak_tree:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies & TWRPDTGEN
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio lz4 xz-utils cpuid
        pip install twrpdtgen

    - name: Download & Ekstrak File
      run: |
        mkdir input output
        # Download file dari link yang lo input nanti
        curl -L -o input/vendor_boot.img "${{ github.event.inputs.download_url }}"
        
        # Jalankan python twrpdtgen buat nyari fstab & generate device tree
        python3 -m twrpdtgen input/vendor_boot.img -o output/

    - name: Simpan Hasil ke Repository
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # Pindahkan hasil ekstraksi ke root repository
        cp -r output/*/* .
        rm -rf input output
        
        # Auto commit balik ke repo lo
        git add .
        git commit -m "Update Device Tree otomatis dari GitHub Action" || exit 0
        git push origin main
        
