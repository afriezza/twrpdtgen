name: Bongkar Paksa Vendor Boot via AIK

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Link download vendor_boot.img dari Releases lo'
        required: true
        default: ''

jobs:
  bongkar_aik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio lz4 xz-utils bzip2 gzip tar file findutils

    - name: Clone AIK Linux
      run: |
        git clone https://github.com/osm0sis/Android-Image-Kitchen.git aik

    - name: Download & Bongkar File
      run: |
        # Download file biner lo ke root dulu
        curl -L -o vendor_boot.img "${{ github.event.inputs.download_url }}"
        
        # Cari otomatis di mana folder yang ada unpackimg.sh nya
        AIK_DIR=$(find . -name "unpackimg.sh" -exec dirname {} \; | head -n 1)
        echo "AIK ditemukan di folder: $AIK_DIR"
        
        # Pindahin file .img ke folder AIK tersebut
        mv vendor_boot.img "$AIK_DIR/"
        
        # Masuk ke folder AIK aslinya
        cd "$AIK_DIR"
        
        # Kasih izin eksekusi secara massal ke semua file script dan biner
        chmod -R +x .
        
        # Jalankan unpackimg.sh bawaan AIK
        ./unpackimg.sh --local vendor_boot.img
        
        # Bikin folder penampung hasil di luar
        mkdir -p ../../hasil_ekstrak
        
        # Pindahin hasil ekstraksi ramdisk (fstab ada di sini)
        if [ -d "ramdisk" ]; then
          cp -r ramdisk/* ../../hasil_ekstrak/
        elif [ -d "split_img" ]; then
          cp -r split_img/* ../../hasil_ekstrak/
        else
          echo "AIK gagal ngebongkar format ramdisk ini"
          exit 1
        fi

    - name: Simpan Hasil ke Repository
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # Pindahkan semua hasil bongkaran ke root repository lo
        cp -r hasil_ekstrak/* . || exit 0
        rm -rf aik hasil_ekstrak vendor_boot.img
        
        git add .
        git commit -m "Bongkar paksa ramdisk sukses via AIK Auto-Path" || exit 0
        git push origin main
