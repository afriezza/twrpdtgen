name: Bongkar Paksa Vendor Boot via AIK

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Link download vendor_boot.img dari Releases lo'
        required: true
        default: ''

jobs:
  bongkar_aik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio lz4 xz-utils bzip2 gzip tar

    - name: Clone AIK Linux
      run: |
        git clone https://github.com/osm0sis/Android-Image-Kitchen.git aik

    - name: Download & Bongkar File
      run: |
        # Download file biner lo
        curl -L -o aik/vendor_boot.img "${{ github.event.inputs.download_url }}"
        
        # Masuk ke folder AIK dan eksekusi bongkar paksa pakai unpackimg
        cd aik
        chmod +x unpackimg.sh
        ./unpackimg.sh vendor_boot.img
        
        # Pindahkan folder ramdisk hasil bongkaran ke luar biar bisa di-save
        mkdir -p ../hasil_ekstrak
        if [ -d "ramdisk" ]; then
          cp -r ramdisk/* ../hasil_ekstrak/
        else
          echo "Gagal unpack otomatis, coba copy file mentah"
          exit 1
        fi

    - name: Simpan Hasil ke Repository
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # Masukkan hasil bongkaran ke dalam repository utama lo
        cp -r hasil_ekstrak/* . || exit 0
        rm -rf aik hasil_ekstrak
        
        git add .
        git commit -m "Bongkar paksa ramdisk via AIK" || exit 0
        git push origin main
