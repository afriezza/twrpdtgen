name: Bongkar Paksa Vendor Boot via AIK

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Link download vendor_boot.img dari Releases lo'
        required: true
        default: ''

jobs:
  bongkar_aik:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cpio lz4 xz-utils bzip2 gzip tar file

    - name: Clone AIK Linux
      run: |
        git clone https://github.com/osm0sis/Android-Image-Kitchen.git aik

    - name: Download & Bongkar File
      run: |
        # Download file biner lo langsung ke folder AIK
        curl -L -o aik/vendor_boot.img "${{ github.event.inputs.download_url }}"
        
        # Masuk ke folder AIK, pasang izin eksekusi ke semua script bawaan AIK
        cd aik
        chmod +x unpackimg.sh cleanup.sh bin/magic bin/unpackimg
        
        # Jalankan unpackimg.sh versi Linux bawaan osm0sis
        ./unpackimg.sh --local vendor_boot.img
        
        # Bikin folder hasil di luar
        mkdir -p ../hasil_ekstrak
        
        # Copy isi ramdisk (tempat fstab berada) ke folder hasil
        if [ -d "ramdisk" ]; then
          cp -r ramdisk/* ../hasil_ekstrak/
        elif [ -d "split_img" ]; then
          cp -r split_img/* ../hasil_ekstrak/
        else
          echo "Format error atau unpack gagal"
          exit 1
        fi

    - name: Simpan Hasil ke Repository
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Action"
        
        # Pindahkan semua hasil ekstrak ke halaman utama repo lo
        cp -r hasil_ekstrak/* . || exit 0
        rm -rf aik hasil_ekstrak
        
        git add .
        git commit -m "Bongkar paksa ramdisk sukses via AIK Fix" || exit 0
        git push origin main
